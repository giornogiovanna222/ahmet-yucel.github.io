
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>CV Sayfam</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body>
  <nav>
    <a href="index.html">Ana Sayfa</a> |
    <a href="about.html">Hakkımda</a> |
    <a href="interests.html">İlgi Alanlarım</a> |
    <a href="contact.html">İletişim</a> |
    <a href="css.html">Css Sayfası</a>
  </nav>

  <div class="contact-container">
    <form action="#" method="post">
      <label for="name">Ad Soyad:</label>
      <input type="text" id="name" name="name" placeholder="Adınızı ve Soyadınızı girin" required>

      <label for="email">E-posta:</label>
      <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>

      <label for="subject">Konu:</label>
      <select id="subject" name="subject" required>
        <option value="">Lütfen bir konu seçin...</option>
        <option value="isTeklifi">İş Teklifi</option>
        <option value="soru">Soru</option>
        <option value="geriBildirim">Geri Bildirim</option>
      </select>

      <label for="message">Mesaj:</label>
      <textarea id="message" name="message" rows="5" placeholder="Mesajınızı buraya yazın..." required></textarea>

      <button type="submit">Gönder</button>
    </form>
  </div>
</body>
</html>
