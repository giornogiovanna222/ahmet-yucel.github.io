
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detaylı İletişim Formu</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <nav>
        <a href="index.html">Ana Sayfa</a> |
        <a href="about.html">Hakkımda</a> |
        <a href="interests.html">İlgi Alanlarım</a> |
        <a href="contact.html">İletişim</a> |
        <a href="css.html">Css Sayfası</a>
        <a href="flexbox.html">Flexbox Sayfası</a>
        
    </nav>

    <div class="form-container">
        <h2>Detaylı İletişim Formu</h2>
        
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="fullname">Ad Soyad:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Örn: Ahmet Yücel">
            </div>

            <div class="form-group">
                <label for="email">E-posta Adresi:</label>
                <input type="email" id="email" name="email" required placeholder="ornek@mail.com">
            </div>

            <div class="form-group">
                <label for="password">Başvuru Takip Şifresi:</label>
                <input type="password" id="password" required name="password" placeholder="Şifrenizi girin">
            </div>

            <div class="form-group">
                <label>İletişim Tercihi:</label>
                <div class="options-box">
                    <label>
                        <input type="radio" name="contact_pref" value="email" checked> Bana e-posta ile ulaşın
                    </label>
                    <label>
                        <input type="radio" name="contact_pref" value="phone"> Bana telefonla ulaşın
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>İlgi Alanları / Yetenekler:</label>
                <div class="options-box">
                    <label><input type="checkbox" name="skills" value="HTML"> HTML</label>
                    <label><input type="checkbox" name="skills" value="CSS"> CSS</label>
                    <label><input type="checkbox" name="skills" value="Algoritma"> Algoritma</label>
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Konu:</label>
                <select id="subject" name="subject">
                    <option value="" disabled selected>Lütfen bir konu seçin...</option>
                    <option value="is_basvurusu">İş Başvurusu</option>
                    <option value="staj">Staj</option>
                    <option value="diger">Diğer</option>
                </select>
            </div>

            <div class="form-group">
                <label for="file_upload">Özgeçmiş (CV) veya Fotoğraf Yükle:</label>
                <input type="file" id="file_upload" name="file_upload">
            </div>

            <div class="form-group">
                <label for="message">Mesajınız:</label>
                <textarea id="message" name="message" placeholder="Detaylı mesajınızı buraya yazabilirsiniz..."></textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Gönder</button>
                <button type="reset" class="btn-reset">Temizle</button>
            </div>

        </form>
    </div>

</body>
</html>
